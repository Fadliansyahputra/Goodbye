<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shy She Amelia</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body,html{width:100%;height:100%;overflow:hidden;background:black;color:white;}

/* BACKGROUND FIX */
.bg{
position:fixed;
width:100%;
height:100%;
background:url('bg.jpg') center/cover no-repeat;
animation:zoom 25s ease-in-out infinite alternate;
filter:brightness(0.5);
z-index:0;
pointer-events:none;
}
@keyframes zoom{from{transform:scale(1);}to{transform:scale(1.1);}}

/* PARTICLE FIX */
#particles{
position:fixed;
width:100%;
height:100%;
z-index:1;
pointer-events:none;
}
.particle{
position:absolute;
width:3px;height:3px;
background:white;
opacity:0.3;
border-radius:50%;
animation:float linear infinite;
}
@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* UI PALING ATAS */
.screen{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
z-index:10;
}

/* BUTTON FIX */
button{
padding:12px 25px;
border:none;
border-radius:25px;
background:white;
color:black;
cursor:pointer;
margin-top:10px;
position:relative;
z-index:20;
}

/* TEXT */
#textBox{
max-width:700px;
line-height:1.8;
}

/* CHAT */
#chat{
position:fixed;
bottom:0;
width:100%;
height:100%;
display:none;
flex-direction:column;
justify-content:flex-end;
padding:15px;
z-index:10;
}

.bubble{
max-width:75%;
padding:10px 15px;
margin:5px;
border-radius:15px;
background:#075e54;
margin-left:auto;
opacity:0;
transform:translateY(20px);
animation:fade .4s forwards;
}
@keyframes fade{to{opacity:1;transform:translateY(0);}}

.typing{
font-size:12px;
opacity:0.6;
margin:5px;
}

/* SHAKE */
.shake{animation:shake .3s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="particles"></div>

<div id="start" class="screen">
<button id="startBtn">buka pelan-pelan...</button>
</div>

<div id="choice" class="screen" style="display:none;">
<p>kamu yakin mau baca ini?</p>
<button id="yes">iya</button>
<button id="no">gak</button>
</div>

<div id="text" class="screen">
<div id="textBox"></div>
</div>

<div id="chat"></div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

/* PARTICLE */
setInterval(()=>{
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(Math.random()*10+10)+"s";
particles.appendChild(p);
setTimeout(()=>p.remove(),15000);
},300);

let music=document.getElementById("music");

/* TYPE */
function type(el,text,i,cb){
if(i<text.length){
el.innerHTML+=text[i];
setTimeout(()=>type(el,text,i+1,cb),30);
}else cb&&cb();
}

/* START FIX */
document.getElementById("startBtn").onclick=function(){
document.getElementById("start").style.display="none";
document.getElementById("choice").style.display="flex";
};

/* NO BUTTON KABUR */
let no=document.getElementById("no");
no.addEventListener("mouseover",function(){
no.style.position="absolute";
no.style.left=Math.random()*80+"%";
no.style.top=Math.random()*80+"%";
});

/* YES */
document.getElementById("yes").onclick=function(){
document.getElementById("choice").style.display="none";
music.play().catch(()=>{});
music.volume=0.4;
showMain(0);
};

/* MAIN */
const main=[
"aku harap kita asing untuk saling memperbaiki diri...",
"jika waktunya tiba aku harap ada kesempatan buat bersama...",
"aku lelah berkelahi sama isi pikiranku..."
];

function showMain(i){
let box=document.getElementById("textBox");
if(i<main.length){
box.innerHTML="";
type(box,main[i],0,function(){
setTimeout(()=>showMain(i+1),2000);
});
}else setTimeout(showMid,1500);
}

/* MID */
const mid=[
"kadang aku mikir...",
"apa semua ini cuma sepihak?",
"aku masih nunggu...",
"sesuatu yang gak pernah kamu janjikan..."
];

function showMid(i=0){
let box=document.getElementById("textBox");
if(i<mid.length){
box.innerHTML="";
type(box,mid[i],0,function(){
setTimeout(()=>showMid(i+1),1800);
});
}else setTimeout(startChat,1500);
}

/* CHAT */
function startChat(){
document.getElementById("text").style.display="none";
let chat=document.getElementById("chat");
chat.style.display="flex";

function add(msg,delay){
setTimeout(()=>{
let d=document.createElement("div");
d.className="bubble";
d.innerText=msg;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
},delay);
}

add("aku kangen...",1000);
add("dulu kita bisa ngobrol tanpa mikir waktu...",3000);
add("sekarang aku bingung harus mulai dari mana...",5000);

add("aku masih sering buka chat lama kita...",8000);
add("scroll ke atas...",10000);
add("dan senyum sendiri...",12000);

setTimeout(()=>{
let t=document.createElement("div");
t.className="typing";
t.innerText="Shy She Amelia sedang mengetik...";
chat.appendChild(t);

setTimeout(()=>t.innerText="...",2000);
setTimeout(()=>t.remove(),4000);
},14000);

add("gapapa kok...",18000);
add("aku ngerti semuanya berubah...",20000);
add("aku cuma belum terbiasa...",23000);

add("aku pamit ya.",26000);
add("beneran kali ini...",28000);

/* DELETE */
setTimeout(()=>{
let msgs=document.querySelectorAll(".bubble");
let i=msgs.length-1;
let del=setInterval(()=>{
if(i>=0){
msgs[i].style.opacity=0;
msgs[i].style.transform="translateY(20px)";
i--;
}else clearInterval(del);
},600);
},32000);

setTimeout(ending,36000);
}

/* ENDING */
function ending(){
document.getElementById("chat").style.display="none";
document.getElementById("text").style.display="flex";

const end=[
"Shy She Amelia...",
"aku sempet mikir...",
"kalau aku pergi...",
"kamu bakal nyariin aku gak ya?",
"...",
"ternyata engga...",
"...",
"aku gak sepenting itu ya...",
"...",
"yang lebih sakit...",
"aku terlalu lama berharap...",
"...",
"tenang aja...",
"aku gak akan ganggu kamu lagi...",
"...",
"kalau suatu hari kamu inget aku...",
"...",
"dan ngerasa ada yang kurang...",
"...",
"itu aku..."
];

showEnd(0);

function showEnd(i){
let box=document.getElementById("textBox");

if(i>=end.length){
music.volume=0;
setTimeout(()=>{
document.body.innerHTML="";
document.body.style.background="black";
},4000);
return;
}

box.innerHTML="";
type(box,end[i],0,function(){
if(end[i].includes("itu aku")){
box.classList.add("shake");
setTimeout(()=>box.classList.remove("shake"),300);
}
setTimeout(()=>showEnd(i+1),2500);
});
}
}

</script>
</body>
</html>
