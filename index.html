<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shy She Amelia</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body,html{width:100%;height:100%;overflow:hidden;background:black;color:white;}

.bg{
position:fixed;width:100%;height:100%;
background:url('bg.jpg') center/cover no-repeat;
animation:zoom 25s ease-in-out infinite alternate;
filter:brightness(0.5);
}
@keyframes zoom{from{transform:scale(1);}to{transform:scale(1.1);}}

#particles{position:fixed;width:100%;height:100%;pointer-events:none;}
.particle{
position:absolute;width:3px;height:3px;background:white;
opacity:0.3;border-radius:50%;
animation:float linear infinite;
}
@keyframes float{from{transform:translateY(100vh);}to{transform:translateY(-10vh);}}

.screen{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
flex-direction:column;text-align:center;padding:20px;
}

button{
padding:12px 25px;border:none;border-radius:25px;
background:white;color:black;cursor:pointer;
}

#choice{display:none;}
#textBox{
max-width:700px;line-height:1.8;
}

#chat{
position:fixed;bottom:0;width:100%;height:100%;
display:none;flex-direction:column;justify-content:flex-end;
padding:15px;
}

.bubble{
max-width:75%;
padding:10px 15px;
margin:5px;
border-radius:15px;
background:#075e54;
margin-left:auto;
opacity:0;
transform:translateY(20px);
animation:fade .4s forwards;
}
@keyframes fade{to{opacity:1;transform:translateY(0);}}

.typing{font-size:12px;opacity:0.6;margin:5px;}

.shake{animation:shake .3s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="particles"></div>

<div id="start" class="screen">
<button id="startBtn">buka pelan-pelan...</button>
</div>

<div id="choice" class="screen">
<p>kamu yakin mau baca ini?</p>
<button id="yes">iya</button>
<button id="no">gak</button>
</div>

<div id="text" class="screen">
<div id="textBox"></div>
</div>

<div id="chat"></div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

/* PARTICLE */
setInterval(()=>{
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(Math.random()*10+10)+"s";
document.getElementById("particles").appendChild(p);
setTimeout(()=>p.remove(),15000);
},300);

let music=document.getElementById("music");

/* TEXT EFFECT */
function type(el,text,i,cb){
if(i<text.length){
el.innerHTML+=text[i];
setTimeout(()=>type(el,text,i+1,cb),30);
}else cb&&cb();
}

/* START */
startBtn.onclick=()=>{
start.style.display="none";
choice.style.display="flex";
};

/* NO BUTTON KABUR */
no.onmouseover=()=>{
no.style.position="absolute";
no.style.left=Math.random()*80+"%";
no.style.top=Math.random()*80+"%";
};

/* YES */
yes.onclick=()=>{
choice.style.display="none";
music.play().catch(()=>{});
music.volume=0.4;
showMain(0);
};

/* MAIN TEXT */
const main=[
"aku harap kita asing untuk saling memperbaiki diri...",
"jika waktunya tiba aku harap ada kesempatan buat bersama...",
"aku lelah berkelahi sama isi pikiranku..."
];

function showMain(i){
if(i<main.length){
textBox.innerHTML="";
type(textBox,main[i],0,()=>setTimeout(()=>showMain(i+1),2000));
}else setTimeout(showMid,1500);
}

/* MIDGAME */
const mid=[
"kadang aku mikir...",
"apa semua ini cuma sepihak?",
"aku masih nunggu...",
"sesuatu yang gak pernah kamu janjikan..."
];

function showMid(i=0){
if(i<mid.length){
textBox.innerHTML="";
type(textBox,mid[i],0,()=>setTimeout(()=>showMid(i+1),1800));
}else setTimeout(startChat,1500);
}

/* CHAT */
function startChat(){
text.style.display="none";
chat.style.display="flex";

function add(msg,delay){
setTimeout(()=>{
let d=document.createElement("div");
d.className="bubble";
d.innerText=msg;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
},delay);
}

add("aku kangen...",1000);
add("dulu kita bisa ngobrol tanpa mikir waktu...",3000);
add("sekarang aku bingung harus mulai dari mana...",5000);

add("aku masih sering buka chat lama kita...",8000);
add("scroll ke atas...",10000);
add("dan senyum sendiri...",12000);

setTimeout(()=>{
let t=document.createElement("div");
t.className="typing";
t.innerText="Shy She Amelia sedang mengetik...";
chat.appendChild(t);

setTimeout(()=>t.innerText="...",2000);
setTimeout(()=>t.remove(),4000);
},14000);

add("gapapa kok...",18000);
add("aku ngerti semuanya berubah...",20000);
add("aku cuma belum terbiasa...",23000);

add("aku pamit ya.",26000);
add("beneran kali ini...",28000);

/* DELETE */
setTimeout(()=>{
let msgs=document.querySelectorAll(".bubble");
let i=msgs.length-1;
let del=setInterval(()=>{
if(i>=0){
msgs[i].style.opacity=0;
msgs[i].style.transform="translateY(20px)";
i--;
}else clearInterval(del);
},600);
},32000);

setTimeout(ending,36000);
}

/* ENDING */
function ending(){
chat.style.display="none";
text.style.display="flex";

const end=[
"Shy She Amelia...",
"aku sempet mikir...",
"kalau aku pergi...",
"kamu bakal nyariin aku gak ya?",
"...",
"ternyata engga...",
"...",
"aku gak sepenting itu ya...",
"...",
"yang lebih sakit...",
"aku terlalu lama berharap...",
"...",
"tenang aja...",
"aku gak akan ganggu kamu lagi...",
"...",
"kalau suatu hari kamu inget aku...",
"...",
"dan ngerasa ada yang kurang...",
"...",
"itu aku..."
];

showEnd(0);

function showEnd(i){
if(i>=end.length){
music.volume=0;
setTimeout(()=>{
document.body.innerHTML="";
document.body.style.background="black";
},4000);
return;
}

textBox.innerHTML="";
type(textBox,end[i],0,()=>{
if(end[i].includes("itu aku")){
textBox.classList.add("shake");
setTimeout(()=>textBox.classList.remove("shake"),300);
}
setTimeout(()=>showEnd(i+1),2500);
});
}
}

</script>
</body>
</html>
